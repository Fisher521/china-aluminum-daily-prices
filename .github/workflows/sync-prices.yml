name: sync-prices
on:
  schedule:
    - cron: '5 2 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch prices
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p data
          curl -sSf "https://www.aluminium-china.com/api/prices/today.csv" \
            -o "data/prices-${DATE}.csv"
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d)"
          git push
